name: ci-cd

on:
  push:
    branches:
      - main


permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub (shell)
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin

      - name: Compute next image tag
        id: tag
        run: |
          echo "NEXT_TAG=v1" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        run: |
          set -euo pipefail
          docker build -t shubham379/ai-self-healing-platform-backend:${{ steps.tag.outputs.NEXT_TAG }} ./backend
          docker push shubham379/ai-self-healing-platform-backend:${{ steps.tag.outputs.NEXT_TAG }}

      - name: Build and push frontend image
        run: |
          set -euo pipefail
          docker build -t shubham379/ai-self-healing-platform-frontend:${{ steps.tag.outputs.NEXT_TAG }} ./frontend
          docker push shubham379/ai-self-healing-platform-frontend:${{ steps.tag.outputs.NEXT_TAG }}

      - name: Update Helm values image tags (backend + frontend)
        run: |
          set -euo pipefail

          # backendImage.tag
          sed -i -E "/backendImage:/,/frontendImage:/ s|(^[[:space:]]+tag: ).*|\1${{ steps.tag.outputs.NEXT_TAG }}|" helm/values.yaml

          # frontendImage.tag
          sed -i -E "/frontendImage:/,/pullPolicy:/ s|(^[[:space:]]+tag: ).*|\1${{ steps.tag.outputs.NEXT_TAG }}|" helm/values.yaml

      - name: Commit Helm values update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/values.yaml
          git commit -m "chore: bump image tag to ${{ steps.tag.outputs.NEXT_TAG }}" || exit 0
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git push

      - name: Trigger ArgoCD sync
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          curl -sS -H "Authorization: Bearer ${ARGOCD_AUTH_TOKEN}" \
            -X POST "${ARGOCD_SERVER}/api/v1/applications/ai-healing-platform/sync"

