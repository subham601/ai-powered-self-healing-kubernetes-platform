name: ci-cd

on:
  push:
    branches: ["main"]


permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute next image tag
        id: tag
        run: |
          echo "NEXT_TAG=v1" >> $GITHUB_OUTPUT

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # IMPORTANT: your Helm chart uses a single image repo/tag for both backend and frontend.
      # Therefore, we publish ONLY ONE image under that repo/tag.
      # (Choose which Dockerfile to build; backend image is currently the one your cluster runs.)
      # If you want separate images, update Helm chart + values accordingly.

      - name: Build and push backend image
        run: |
          docker build -t shubham379/ai-self-healing-platform:${{ steps.tag.outputs.NEXT_TAG }} ./backend
          docker push shubham379/ai-self-healing-platform:${{ steps.tag.outputs.NEXT_TAG }}

      - name: Update Helm values image tag
        run: |
          sed -i -E "s|^  tag: .*|  tag: ${{ steps.tag.outputs.NEXT_TAG }}|" helm/values.yaml

      - name: Commit Helm values update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/values.yaml
          git commit -m "chore: bump image tag to ${{ steps.tag.outputs.NEXT_TAG }}" || exit 0
          git push

      - name: Trigger ArgoCD sync
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          curl -sS -H "Authorization: Bearer ${ARGOCD_AUTH_TOKEN}" \
            -X POST "${ARGOCD_SERVER}/api/v1/applications/ai-healing-platform/sync"

