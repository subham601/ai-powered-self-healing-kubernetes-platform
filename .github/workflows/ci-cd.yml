name: ci-cd

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Compile backend
        run: python -m compileall backend/ai_self_healing_backend

  build-and-deploy:
    needs: test-backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin

      - name: Compute image tag
        id: tag
        run: echo "NEXT_TAG=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        run: |
          docker build -t shubham379/ai-self-healing-platform-backend:${{ steps.tag.outputs.NEXT_TAG }} ./backend
          docker push shubham379/ai-self-healing-platform-backend:${{ steps.tag.outputs.NEXT_TAG }}

      - name: Build and push frontend
        run: |
          docker build -t shubham379/ai-self-healing-platform-frontend:${{ steps.tag.outputs.NEXT_TAG }} ./frontend
          docker push shubham379/ai-self-healing-platform-frontend:${{ steps.tag.outputs.NEXT_TAG }}

      - name: Bump Helm image tags
        run: |
          TAG="${{ steps.tag.outputs.NEXT_TAG }}"
          python3 <<'PY'
          import pathlib, re, os
          tag = os.environ["TAG"]
          p = pathlib.Path("helm/values.yaml")
          text = p.read_text()
          text = re.sub(
              r"(backendImage:\n(?:  .+\n)*?  tag:)\s*\S+",
              rf"\1 {tag}",
              text,
              count=1,
          )
          text = re.sub(
              r"(frontendImage:\n(?:  .+\n)*?  tag:)\s*\S+",
              rf"\1 {tag}",
              text,
              count=1,
          )
          p.write_text(text)
          PY
        env:
          TAG: ${{ steps.tag.outputs.NEXT_TAG }}

      - name: Commit Helm values
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/values.yaml
          git diff --cached --quiet && exit 0
          git commit -m "chore: bump image tags to ${{ steps.tag.outputs.NEXT_TAG }}"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git push
