apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-healing-platform.fullname" . }}-frontend
  namespace: {{ .Values.namespaceOverride }}
spec:
  type: {{ .Values.frontend.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "ai-healing-platform.name" . }}
    app.kubernetes.io/component: frontend
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: 8085
      name: http

