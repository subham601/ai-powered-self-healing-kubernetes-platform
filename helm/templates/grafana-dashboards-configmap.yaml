{{- if .Values.monitoring.enabled }}
{{- $fullname := include "ai-healing-platform.fullname" . -}}
{{- $ns := .Values.namespaceOverride -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $fullname }}-grafana-dashboards
  namespace: {{ $ns }}
  labels:
    grafana_dashboard: "1"
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'ai-self-healing'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /etc/grafana/provisioning/dashboards
  production-pod-logs.json: |
{{ .Files.Get "files/production-pod-logs.json" | indent 4 }}
{{- end }}
