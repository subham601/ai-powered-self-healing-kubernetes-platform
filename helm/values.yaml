namespaceOverride: ai-healing-system
nameOverride: ai-healing-platform

backendImage:
  repository: shubham379/ai-self-healing-platform-backend
  tag: 8b85100
  pullPolicy: IfNotPresent

frontendImage:
  repository: shubham379/ai-self-healing-platform-frontend
  tag: 8b85100
  pullPolicy: IfNotPresent

backend:
  replicas: 2
  service:
    type: ClusterIP
    port: 9000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    selfHealAllowedNamespaces: ai-healing-system
    selfHealMaxRetries: "3"
    selfHealCooldownSeconds: "300"
    alertAutoHeal: "true"
    alertDryRun: "false"

frontend:
  replicas: 1
  service:
    type: ClusterIP
    port: 8085
  ingress:
    enabled: true
    host: ai-healing.local
  apiBaseUrl: /api

monitoring:
  enabled: true
  prometheus:
    image: prom/prometheus:v2.54.1
  alertmanager:
    image: prom/alertmanager:v0.27.0
  grafana:
    image: grafana/grafana:11.2.0
    adminPassword: changeme
  loki:
    image: grafana/loki:3.1.0

  promtail:
    enabled: true
    image: grafana/promtail:3.1.0
    # Override if Loki is outside this Helm release. Defaults to in-cluster Loki.
    lokiUrl: ""

ai:
  provider: ollama
  ollamaBaseUrl: http://ollama:11434
  ollamaModel: llama3
  openaiModel: gpt-4o-mini
  openaiApiKeySecretRef:
    name: ai-healing-openai
    key: OPENAI_API_KEY

security:
  rbac:
    create: true
  serviceAccountName: ai-healing-platform
  auditLedger:
    configMapName: ai-self-healing-audit-ledger

corsAllowOrigins: "*"
