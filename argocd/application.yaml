apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-healing-platform
  namespace: argocd
spec:
  project: ai-healing-platform
  destination:
    namespace: ai-healing-system
    server: https://kubernetes.default.svc
  source:
    # Point to your Git repository containing this monorepo.
    repoURL: https://github.com/subham601/ai-powered-self-healing-kubernetes-platform.git
    targetRevision: HEAD
    path: helm
    helm:
      valueFiles:
        - values.yaml
      parameters:
        - name: backendImage.tag
          value: v1
        - name: frontendImage.tag
          value: v1
        - name: monitoring.enabled
          value: "true"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
